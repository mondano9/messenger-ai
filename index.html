<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>5P Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 15px; background: white; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 10px; }
        .dot { width: 10px; height: 10px; background: #31a24c; border-radius: 50%; }
        .chat { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 15px; }
        .bot { align-self: flex-start; background: #e4e6eb; color: black; border-bottom-left-radius: 4px; }
        .user { align-self: flex-end; background: #0084ff; color: white; border-bottom-right-radius: 4px; }
        .input-box { padding: 10px; display: flex; gap: 10px; background: white; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #ddd; outline: none; background: #f0f2f5; }
        button { background: none; border: none; font-weight: bold; color: #0084ff; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header"><div class="dot"></div><h3>5P AI Assistant</h3></div>
    <div id="chat" class="chat"><div class="msg bot">Hello! I'll help you earn ₱5 profit. Ask me anything!</div></div>
    <div class="input-box">
        <input type="text" id="in" placeholder="Cost price?">
        <button onclick="send()">Send</button>
    </div>

    <script>
        async function send() {
            const i = document.getElementById('in'), c = document.getElementById('chat');
            if(!i.value) return;
            const text = i.value;
            c.innerHTML += `<div class="msg user">${text}</div>`;
            i.value = '';
            c.scrollTop = c.scrollHeight;

            const loadId = "L" + Date.now();
            c.innerHTML += `<div class="msg bot" id="${loadId}">...</div>`;

            try {
                const res = await fetch('http://localhost:11434/api/chat', {
                    method: 'POST',
                    body: JSON.stringify({ 
                        model: 'llama3.2:1b', 
                        messages: [
                            { role: 'system', content: 'You are a shop assistant in the Philippines. Always add 5 pesos to the cost price the user gives. Keep it short.' },
                            { role: 'user', content: text }
                        ], 
                        stream: false 
                    })
                });
                const data = await res.json();
                // FIXED: Using data.message.content to avoid "undefined"
                document.getElementById(loadId).innerText = data.message.content;
            } catch {
                document.getElementById(loadId).innerText = "Error: Check your ollama serve window!";
            }
            c.scrollTop = c.scrollHeight;
        }
    </script>
</body>
</html>
